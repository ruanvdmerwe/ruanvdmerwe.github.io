profile: >
  Applied machine learning researcher and AI leader specialising in speech and
  language systems, with a focus on continual and meta-learning for acoustic
  modelling. My work addresses catastrophic forgetting in few-shot speech
  classification, analyses representation geometry to understand and predict
  downstream task performance, and develops principled evaluation frameworks for
  real-world speech systems. I bridge theoretical research and production-grade
  implementation by designing reproducible experimentation pipelines,
  multilingual benchmarking strategies, and signal-quality diagnostics such as
  SNR-based filtering. In addition to research, I lead scientific strategy and
  ML architecture development in an industrial context — guiding research
  direction, defining experimental standards, mentoring researchers, and
  translating algorithmic advances into scalable deployed systems.

research_themes:
  - name: Meta-learning
    description: >
      Few-shot adaptation, MAML-family optimisation, and learning-to-learn
      frameworks for data-efficient systems.
  - name: Continual learning
    description: >
      Stability–plasticity trade-offs, catastrophic forgetting mitigation, and
      sequential task adaptation.
  - name: Metric & representation learning
    description: >
      Embedding geometry, manifold diagnostics, and principled evaluation of
      learned representations.

